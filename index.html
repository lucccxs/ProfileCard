<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Perfil</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Faça seu Cartão</h1>
    </header>

    <nav class="fazendoCard">
        <div class="nome">
            <button class="btnNome">Atualizar Nome</button>
            <input class="attNome" type="text" placeholder="Digite seu nome" maxlength="50">
        </div>
        <div class="descricao">
            <button class="btnDesc">Atualizar Descrição</button>
            <input class="attDesc" type="text" placeholder="Digite sua descrição" maxlength="500">
        </div>
    </nav>

    <main class="card-alinhado">
        <div id="card">
            <div class="info">
                <div class="preencherNome">
                    <h2>Nome: </h2>
                    <div class="orgNome">
                        <span id="span-nome"></span>
                        <hr id="linha-nome">
                    </div>
                </div>

                <div>
                    <img src="imagens/luffy.jpg" alt="Foto do personagem">
                    <p class="descricao-texto"></p>
                </div>

                <button id="modoNoturno">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-lightbulb" viewBox="0 0 16 16">
                        <path d="M2 6a6 6 0 1 1 10.174 4.31c-.203.196-.359.4-.453.619l-.762 1.769A.5.5 0 0 1 10.5 13a.5.5 0 0 1 0 1 .5.5 0 0 1 0 1l-.224.447a1 1 0 0 1-.894.553H6.618a1 1 0 0 1-.894-.553L5.5 15a.5.5 0 0 1 0-1 .5.5 0 0 1 0-1 .5.5 0 0 1-.46-.302l-.761-1.77a2 2 0 0 0-.453-.618A5.98 5.98 0 0 1 2 6m6-5a5 5 0 0 0-3.479 8.592c.263.254.514.564.676.941L5.83 12h4.342l.632-1.467c.162-.377.413-.687.676-.941A5 5 0 0 0 8 1" />
                    </svg>
                </button>
            </div>
        </div>
    </main>
</body>

</html>
